providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x", "python3", "gcc", "gnumake"]
# python3 + gcc + gnumake OBLIGATORIOS: better-sqlite3 se compila nativamente con node-gyp

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
# Producción: solo la web (Next.js sirve el panel + /api/*). El bot de WhatsApp
# (start:all) se activa más adelante cuando conectemos el teléfono de Mary;
# correrlo junto con --kill-others desestabilizaba el contenedor.
cmd = "npm run start"
