providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x", "python3", "gcc", "gnumake"]
# python3 + gcc + gnumake OBLIGATORIOS: better-sqlite3 se compila nativamente con node-gyp

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
# Producción: web + motor de WhatsApp juntos, PERO sin --kill-others, para que
# si el motor de WhatsApp hipa NO se lleve la web (antes start:all con
# --kill-others tumbaba todo). La IA solo sugiere; nada responde solo.
cmd = "npm run start:prod"
